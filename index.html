<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus — Priority Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --purple-50:#EEEDFE;--purple-200:#AFA9EC;--purple-400:#7F77DD;--purple-600:#534AB7;
    --coral-50:#FAECE7;--coral-400:#D85A30;--coral-600:#993C1D;
    --teal-50:#E1F5EE;--teal-400:#1D9E75;--teal-600:#0F6E56;
    --amber-50:#FAEEDA;--amber-400:#EF9F27;--amber-600:#854F0B;
    --red-50:#FCEBEB;--red-400:#E24B4A;--red-600:#A32D2D;
    --gray-50:#F1EFE8;--gray-200:#D4D2CB;--gray-400:#888780;--gray-600:#5F5E5A;--gray-800:#444441;
    --bg:#F7F6F3;--surface:#FFFFFF;
    --border:rgba(0,0,0,0.09);--border-md:rgba(0,0,0,0.16);
    --text-primary:#1a1a18;--text-secondary:#5F5E5A;--text-muted:#888780;
    --radius-sm:6px;--radius-md:10px;--radius-lg:14px;
    --font-display:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;
  }
  body { font-family:var(--font-body);background:var(--bg);color:var(--text-primary);min-height:100vh; }
  .layout { display:flex;height:100vh;overflow:hidden; }

  /* ── Sidebar ── */
  .sidebar { width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto; }
  .sidebar-logo { padding:18px 18px 14px;border-bottom:1px solid var(--border); }
  .logo-mark { display:flex;align-items:center;gap:10px; }
  .logo-icon { width:32px;height:32px;background:var(--purple-400);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:white;font-size:16px; }
  .logo-text { font-family:var(--font-display);font-size:17px;font-weight:700;color:var(--text-primary);letter-spacing:-.3px; }
  .logo-sub { font-size:11px;color:var(--text-muted);margin-top:1px; }
  .sync-status { margin:10px 14px 0;padding:7px 10px;background:var(--teal-50);border-radius:var(--radius-sm);border:1px solid rgba(29,158,117,0.2); }
  .sync-status.stale { background:var(--amber-50);border-color:rgba(239,159,39,0.2); }
  .sync-status.never { background:var(--gray-50);border-color:var(--border); }
  .sync-label { font-size:11px;font-weight:600;color:var(--teal-600);display:flex;align-items:center;gap:5px; }
  .sync-status.stale .sync-label { color:var(--amber-600); }
  .sync-status.never .sync-label { color:var(--gray-600); }
  .sync-time { font-size:10px;color:var(--text-muted);margin-top:2px; }
  .nav { padding:10px 8px;flex:1; }
  .nav-section-label { font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding:8px 10px 4px; }
  .nav-item { display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius-sm);font-size:13px;color:var(--text-secondary);cursor:pointer;transition:all .12s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left;font-family:var(--font-body); }
  .nav-item:hover { background:var(--bg);color:var(--text-primary); }
  .nav-item.active { background:var(--purple-50);color:var(--purple-600);font-weight:500; }
  .nav-item i { font-size:16px; }
  .nav-badge { margin-left:auto;font-size:11px;border-radius:20px;padding:1px 7px;font-weight:600; }
  .nb-red { background:var(--red-50);color:var(--red-600); }
  .nb-purple { background:var(--purple-50);color:var(--purple-600); }
  .nb-amber { background:var(--amber-50);color:var(--amber-600); }
  .sidebar-bottom { padding:14px;border-top:1px solid var(--border); }
  .int-label { font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:8px; }
  .int-pill { display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-secondary);padding:4px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:4px;background:none;width:100%;font-family:var(--font-body); }
  .int-dot { width:6px;height:6px;border-radius:50%;flex-shrink:0; }
  .dot-gmail{background:var(--coral-400);} .dot-cal{background:var(--teal-400);} .dot-slack{background:var(--purple-400);}
  .int-pill-status { margin-left:auto;font-size:10px;color:var(--teal-600);font-weight:500; }

  /* ── Main ── */
  .main { flex:1;display:flex;flex-direction:column;overflow:hidden; }
  .topbar { padding:12px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0; }
  .topbar-title { font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--text-primary); }
  .topbar-desc { font-size:11px;color:var(--text-muted); }
  .topbar-actions { display:flex;gap:8px;align-items:center; }
  .btn { display:inline-flex;align-items:center;gap:6px;padding:6px 13px;font-size:13px;border-radius:var(--radius-sm);border:1px solid var(--border-md);cursor:pointer;background:var(--surface);color:var(--text-primary);font-family:var(--font-body);transition:all .12s; }
  .btn:hover { background:var(--bg); }
  .btn-primary { background:var(--purple-400);color:white;border-color:var(--purple-400);font-weight:500; }
  .btn-primary:hover { background:var(--purple-600);border-color:var(--purple-600); }
  .btn i { font-size:14px; }

  /* ── Dashboard ── */
  .dashboard-wrap { flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:20px; }

  /* Today strip */
  .today-strip { display:grid;grid-template-columns:repeat(4,1fr);gap:12px; }
  .today-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 16px; }
  .today-card-label { font-size:11px;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px; }
  .today-card-value { font-family:var(--font-display);font-size:26px;font-weight:700;color:var(--text-primary);line-height:1; }
  .today-card-sub { font-size:11px;color:var(--text-muted);margin-top:4px; }
  .today-card.urgent-card { border-color:rgba(226,75,74,0.25);background:var(--red-50); }
  .today-card.urgent-card .today-card-value { color:var(--red-600); }
  .today-card.inbox-card { border-color:rgba(127,119,221,0.25);background:var(--purple-50); }
  .today-card.inbox-card .today-card-value { color:var(--purple-600); }

  /* Task list section */
  .section { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden; }
  .section-header { padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between; }
  .section-title { font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:7px; }
  .section-count { font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500; }
  .sc-urgent{background:var(--red-50);color:var(--red-600);}
  .sc-high{background:var(--coral-50);color:var(--coral-600);}
  .sc-medium{background:var(--amber-50);color:var(--amber-600);}
  .sc-low{background:var(--teal-50);color:var(--teal-600);}
  .sc-na{background:var(--gray-50);color:var(--gray-600);}
  .sc-none{background:var(--gray-50);color:var(--gray-400);}
  .section-toggle { background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px;display:flex;align-items:center;padding:2px;border-radius:4px; }
  .section-toggle:hover { color:var(--text-primary);background:var(--bg); }
  .section-body { display:flex;flex-direction:column; }
  .section-body.collapsed { display:none; }

  /* Task rows in dashboard list */
  .task-row { display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);transition:background .1s; }
  .task-row:last-child { border-bottom:none; }
  .task-row:hover { background:var(--bg); }
  .task-row.done-row { opacity:.4; }
  .task-check { width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border-md);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s; }
  .task-check:hover { border-color:var(--teal-400); }
  .task-check.checked { background:var(--teal-400);border-color:var(--teal-400); }
  .task-check.checked::after { content:'✓';color:white;font-size:8px;font-weight:700; }
  .task-row-name { flex:1;font-size:13px;color:var(--text-primary);line-height:1.4; }
  .task-row-name.done-name { text-decoration:line-through;color:var(--text-muted); }
  .task-row-meta { display:flex;align-items:center;gap:6px;flex-shrink:0; }
  .src-tag { font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500; }
  .tag-gmail{background:var(--coral-50);color:var(--coral-600);}
  .tag-calendar{background:var(--teal-50);color:var(--teal-600);}
  .tag-slack{background:var(--purple-50);color:var(--purple-600);}
  .tag-manual{background:var(--gray-50);color:var(--gray-600);}
  .tag-reminder{background:var(--amber-50);color:var(--amber-600);}
  .task-due-tag { font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:3px; }
  .task-due-tag.overdue { color:var(--red-600);font-weight:500; }
  .escalation-flag { font-size:10px;background:var(--amber-50);color:var(--amber-600);border:1px solid rgba(239,159,39,0.3);padding:1px 7px;border-radius:20px;font-weight:500; }
  .row-del { background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:13px;padding:2px;border-radius:4px;opacity:0;transition:opacity .12s; }
  .task-row:hover .row-del { opacity:1; }
  .row-del:hover { color:var(--red-600); }
  .add-row-btn { display:flex;align-items:center;gap:6px;padding:9px 16px;font-size:12px;color:var(--text-muted);cursor:pointer;background:none;border:none;font-family:var(--font-body);width:100%;transition:all .12s; }
  .add-row-btn:hover { color:var(--purple-600);background:var(--purple-50); }

  /* ── Inbox ── */
  .inbox-wrap { flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px; }
  .inbox-header-bar { display:flex;align-items:center;justify-content:space-between; }
  .inbox-title { font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--text-primary); }
  .triage-counter { font-size:12px;color:var(--teal-600);font-weight:600;background:var(--teal-50);padding:4px 12px;border-radius:20px;border:1px solid rgba(29,158,117,0.2); }
  .inbox-empty { text-align:center;padding:60px 20px;color:var(--text-muted); }
  .inbox-empty i { font-size:36px;display:block;margin-bottom:12px;opacity:.3; }
  .inbox-empty-title { font-family:var(--font-display);font-size:15px;font-weight:600;margin-bottom:6px;color:var(--text-secondary); }
  .inbox-empty-sub { font-size:13px;line-height:1.5; }
  .inbox-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 16px;transition:border-color .12s,box-shadow .12s; }
  .inbox-card:hover { border-color:var(--border-md);box-shadow:0 2px 8px rgba(0,0,0,.06); }
  .inbox-card-top { display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px; }
  .inbox-card-name { font-size:14px;font-weight:500;color:var(--text-primary);line-height:1.4;flex:1; }
  .inbox-card-meta { display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px; }
  .inbox-suggested { font-size:11px;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:5px; }
  .inbox-suggested strong { color:var(--text-secondary); }
  .triage-btns { display:flex;gap:6px;flex-wrap:wrap; }
  .triage-btn { padding:6px 12px;font-size:12px;font-weight:600;border-radius:20px;border:1.5px solid transparent;cursor:pointer;font-family:var(--font-body);transition:all .12s; }
  .tb-urgent { background:var(--red-50);color:var(--red-600);border-color:rgba(226,75,74,0.25); }
  .tb-urgent:hover { background:var(--red-400);color:white;border-color:var(--red-400); }
  .tb-high { background:var(--coral-50);color:var(--coral-600);border-color:rgba(216,90,48,0.25); }
  .tb-high:hover { background:var(--coral-400);color:white;border-color:var(--coral-400); }
  .tb-medium { background:var(--amber-50);color:var(--amber-600);border-color:rgba(239,159,39,0.25); }
  .tb-medium:hover { background:var(--amber-400);color:white;border-color:var(--amber-400); }
  .tb-low { background:var(--teal-50);color:var(--teal-600);border-color:rgba(29,158,117,0.25); }
  .tb-low:hover { background:var(--teal-400);color:white;border-color:var(--teal-400); }
  .tb-na { background:var(--gray-50);color:var(--gray-600);border-color:rgba(0,0,0,0.1); }
  .tb-na:hover { background:var(--gray-400);color:white;border-color:var(--gray-400); }
  .inbox-dismiss { background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px;padding:2px;border-radius:4px;flex-shrink:0; }
  .inbox-dismiss:hover { color:var(--red-400); }

  /* ── Work Tracker ── */
  .tracker-wrap { flex:1;overflow:hidden;display:flex;flex-direction:column; }
  .tracker-toolbar { padding:10px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface);flex-shrink:0;flex-wrap:wrap; }
  .filter-group { display:flex;align-items:center;gap:6px; }
  .filter-label { font-size:11px;color:var(--text-muted);font-weight:500;white-space:nowrap; }
  .filter-select { padding:5px 10px;font-size:12px;border:1px solid var(--border-md);border-radius:var(--radius-sm);background:var(--surface);color:var(--text-primary);font-family:var(--font-body);outline:none; }
  .filter-input { padding:5px 10px;font-size:12px;border:1px solid var(--border-md);border-radius:var(--radius-sm);background:var(--surface);color:var(--text-primary);font-family:var(--font-body);outline:none;width:180px; }
  .filter-clear { font-size:12px;color:var(--purple-600);cursor:pointer;background:none;border:none;font-family:var(--font-body);padding:0 4px; }
  .tracker-scroll { flex:1;overflow-y:auto;padding:0 0 20px; }
  .tracker-table { width:100%;border-collapse:separate;border-spacing:0;font-size:13px; }
  .tracker-table thead th { padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;background:var(--surface);position:sticky;top:0;z-index:1; }
  .tracker-table thead th:hover { color:var(--text-primary); }
  .sort-icon { font-size:11px;margin-left:4px;opacity:.5; }
  .tracker-table thead th.sorted { color:var(--purple-600); }
  .tracker-table thead th.sorted .sort-icon { opacity:1; }
  .tracker-row { border-bottom:1px solid var(--border);transition:background .1s; }
  .tracker-row:hover { background:var(--bg); }
  .tracker-row td { padding:9px 12px;vertical-align:top; }
  .task-name-cell { display:flex;align-items:flex-start;gap:7px; }
  .row-source-dot { width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px; }
  .task-name-text { flex:1;line-height:1.4;font-weight:500; }
  .urgency-pill { display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;cursor:pointer; }
  .urg-urgent{background:var(--red-50);color:var(--red-600);}
  .urg-high{background:var(--coral-50);color:var(--coral-600);}
  .urg-medium{background:var(--amber-50);color:var(--amber-600);}
  .urg-low{background:var(--teal-50);color:var(--teal-600);}
  .urg-na{background:var(--gray-50);color:var(--gray-400);}
  .urg-none{background:transparent;color:var(--text-muted);font-weight:400;font-size:11px;}
  .details-cell{color:var(--text-secondary);max-width:240px;line-height:1.45;}
  .notes-cell{color:var(--text-muted);max-width:200px;line-height:1.45;font-style:italic;font-size:12px;}
  .due-cell{white-space:nowrap;color:var(--text-muted);font-size:12px;}
  .due-cell.overdue{color:var(--red-600);font-weight:500;}
  .row-actions{opacity:0;transition:opacity .12s;display:flex;gap:3px;}
  .tracker-row:hover .row-actions{opacity:1;}
  .row-action-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:3px;border-radius:4px;font-size:13px;display:flex;align-items:center;}
  .row-action-btn:hover{color:var(--text-primary);background:var(--gray-200);}
  .tracker-empty{text-align:center;padding:48px 20px;color:var(--text-muted);}
  .tracker-count{font-size:12px;color:var(--text-muted);margin-left:auto;}
  .editable{cursor:text;border-radius:4px;padding:1px 3px;margin:-1px -3px;}
  .editable:hover{background:var(--bg);}
  .editable:focus{outline:none;background:var(--purple-50);box-shadow:0 0 0 2px var(--purple-200);}

  /* ── Toast ── */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text-primary);color:white;padding:10px 20px;border-radius:var(--radius-md);font-size:13px;font-weight:500;transition:transform .25s cubic-bezier(.34,1.56,.64,1);z-index:100;pointer-events:none;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}

  /* ── Modal ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;backdrop-filter:blur(2px);}
  .modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:24px;width:440px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.12);}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .modal-title{font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--text-primary);}
  .close-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:19px;display:flex;align-items:center;border-radius:4px;padding:2px;}
  .close-btn:hover{color:var(--text-primary);background:var(--bg);}
  .field{margin-bottom:14px;}
  .field label{font-size:12px;color:var(--text-secondary);display:block;margin-bottom:5px;font-weight:500;}
  .field-optional{font-size:10px;color:var(--text-muted);font-weight:400;margin-left:4px;}
  .field input,.field select,.field textarea{width:100%;padding:8px 11px;font-size:13px;border:1px solid var(--border-md);border-radius:var(--radius-sm);background:var(--bg);color:var(--text-primary);font-family:var(--font-body);outline:none;transition:border-color .12s;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--purple-400);box-shadow:0 0 0 3px var(--purple-50);}
  .field textarea{resize:none;height:64px;line-height:1.5;}
  .urg-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
  .urg-opt{padding:8px 4px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .12s;}
  .urg-opt:hover{background:var(--bg);}
  .urg-opt.sel-urgent{border-color:var(--red-400);background:var(--red-50);color:var(--red-600);}
  .urg-opt.sel-high{border-color:var(--coral-400);background:var(--coral-50);color:var(--coral-600);}
  .urg-opt.sel-medium{border-color:var(--amber-400);background:var(--amber-50);color:var(--amber-600);}
  .urg-opt.sel-low{border-color:var(--teal-400);background:var(--teal-50);color:var(--teal-600);}
  .urg-opt.sel-na{border-color:var(--gray-400);background:var(--gray-50);color:var(--gray-600);}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);}

  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:4px;}
  @media(max-width:768px){.sidebar{width:200px;}.today-strip{grid-template-columns:1fr 1fr;}.field-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon">⚡</div>
        <div><div class="logo-text">Focus</div><div class="logo-sub">Priority task manager</div></div>
      </div>
      <div class="sync-status never" id="sync-status">
        <div class="sync-label"><i class="ti ti-refresh" style="font-size:11px"></i><span id="sync-label-text">Never synced</span></div>
        <div class="sync-time" id="sync-time-text">Open Cowork to run first sync</div>
      </div>
    </div>
    <nav class="nav">
      <button class="nav-item active" onclick="setView('dashboard',this)"><i class="ti ti-home"></i> Dashboard <span class="nav-badge nb-red" id="urgent-count" style="display:none">0</span></button>
      <button class="nav-item" onclick="setView('inbox',this)"><i class="ti ti-inbox"></i> Inbox <span class="nav-badge nb-purple" id="inbox-count">0</span></button>
      <button class="nav-item" onclick="setView('tracker',this)"><i class="ti ti-table"></i> Work tracker</button>
      <div class="nav-section-label" style="margin-top:6px">Integrations</div>
      <button class="nav-item" onclick="showSyncHelp()"><i class="ti ti-plug"></i> Sync settings</button>
    </nav>
    <div class="sidebar-bottom">
      <div class="int-label">Connected via Cowork</div>
      <div class="int-pill"><div class="int-dot dot-gmail"></div><span style="font-size:12px;color:var(--text-secondary);flex:1">Gmail</span><span class="int-pill-status">Auto</span></div>
      <div class="int-pill"><div class="int-dot dot-cal"></div><span style="font-size:12px;color:var(--text-secondary);flex:1">Google Calendar</span><span class="int-pill-status">Auto</span></div>
      <div class="int-pill"><div class="int-dot dot-slack"></div><span style="font-size:12px;color:var(--text-secondary);flex:1">Slack</span><span class="int-pill-status">Auto</span></div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="view-title">Dashboard</div>
        <div class="topbar-desc" id="view-desc">Your day at a glance</div>
      </div>
      <div class="topbar-actions">
        <button class="btn" onclick="reloadTasks()"><i class="ti ti-refresh"></i> Refresh</button>
        <button class="btn btn-primary" id="add-btn" onclick="openAddModal()"><i class="ti ti-plus"></i> Add task</button>
      </div>
    </div>
    <div class="dashboard-wrap" id="content-wrap"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const MANUAL_KEY = 'focus_manual_v2';
const INBOX_KEY  = 'focus_inbox_v1';
const TRACKER_KEY= 'focus_tracker_v2';
const TRIAGED_KEY= 'focus_triaged_today';

// urgency config
const URG_LEVELS = ['urgent','high','medium','low','na'];
const URG_LABEL  = {urgent:'Urgent',high:'High',medium:'Medium',low:'Low',na:'N/A','':''};
const URG_ORDER  = {urgent:0,high:1,medium:2,low:3,na:4,'':5};
const URG_CLASS  = {urgent:'urg-urgent',high:'urg-high',medium:'urg-medium',low:'urg-low',na:'urg-na','':'urg-none'};
const URG_SC     = {urgent:'sc-urgent',high:'sc-high',medium:'sc-medium',low:'sc-low',na:'sc-na','':'sc-none'};
const URG_ICON   = {urgent:'ti-flame',high:'ti-arrow-up',medium:'ti-minus',low:'ti-arrow-down',na:'ti-x','':"ti-circle"};

let tasks = [];        // triaged tasks (have urgency assigned)
let inboxItems = [];   // new synced tasks awaiting triage
let trackerItems = [];
let nextId = 200;
let nextTid = 1;
let currentView = 'dashboard';
let selectedUrg = 'medium';
let triagedToday = 0;

// sort/filter for tracker
let tSort = {col:'urgency',dir:'asc'};
let tFilter = {urgency:'',search:''};

// collapsed sections on dashboard
let collapsedSections = {};

// ── Load ──────────────────────────────────────────────────────────
async function loadTasks() {
  try {
    const res = await fetch('tasks.json?t=' + Date.now());
    if (!res.ok) throw new Error();
    const data = await res.json();
    const rawTasks = data.tasks || [];
    nextId = rawTasks.reduce((m,t)=>Math.max(m,t.id),0)+1;
    processIncoming(rawTasks);
    updateSyncStatus(data.last_synced);
  } catch(e) {
    // load from local storage only
    tasks = JSON.parse(localStorage.getItem(MANUAL_KEY+'_tasks')||'[]');
    inboxItems = JSON.parse(localStorage.getItem(INBOX_KEY)||'[]');
    updateSyncStatus(null,true);
  }
  loadTrackerItems();
  loadTriagedCount();
  renderTasks();
}

function processIncoming(rawTasks) {
  // load existing triaged tasks and inbox from storage
  const storedTasks   = JSON.parse(localStorage.getItem(MANUAL_KEY+'_tasks')||'[]');
  const storedInbox   = JSON.parse(localStorage.getItem(INBOX_KEY)||'[]');
  const storedDeleted = JSON.parse(localStorage.getItem(MANUAL_KEY+'_deleted')||'[]');
  const storedDone    = JSON.parse(localStorage.getItem(MANUAL_KEY+'_done')||'{}');
  const storedManual  = JSON.parse(localStorage.getItem(MANUAL_KEY+'_manual')||'[]');

  // IDs already known (triaged or inboxed)
  const knownIds = new Set([
    ...storedTasks.map(t=>t.id),
    ...storedInbox.map(t=>t.id),
    ...storedDeleted
  ]);

  // apply done overlay to stored tasks
  tasks = storedTasks
    .filter(t => !storedDeleted.includes(t.id))
    .map(t => ({ ...t, done: storedDone[t.id] !== undefined ? storedDone[t.id] : t.done }));

  // add manual tasks
  storedManual.forEach(mt => { if(!tasks.find(t=>t.id===mt.id)) tasks.push(mt); });

  // new tasks from sync not yet seen → inbox
  inboxItems = [...storedInbox];
  rawTasks.forEach(t => {
    if (!knownIds.has(t.id) && !storedDeleted.includes(t.id)) {
      // suggest urgency from q field if present
      const suggestedUrg = t.urgency || ({1:'urgent',2:'high',3:'medium',4:'low'}[t.q]||'medium');
      inboxItems.push({ ...t, suggestedUrg, inboxed: true });
      knownIds.add(t.id);
    }
  });

  saveAll();
}

function saveAll() {
  try {
    localStorage.setItem(MANUAL_KEY+'_tasks', JSON.stringify(tasks));
    localStorage.setItem(INBOX_KEY, JSON.stringify(inboxItems));
  } catch(e) {}
}

function loadTrackerItems() {
  try { trackerItems = JSON.parse(localStorage.getItem(TRACKER_KEY)||'[]'); } catch(e) { trackerItems=[]; }
  nextTid = trackerItems.reduce((m,t)=>Math.max(m,t.tid||0),0)+1;
  // sync tracker with triaged tasks
  tasks.forEach(t => {
    if (!t.done && !trackerItems.find(ti=>ti.taskId===t.id)) {
      trackerItems.push({ tid:nextTid++, taskId:t.id, name:t.name, details:'', owner:'', urgency:t.urgency||'', notes:'', due:t.due||'', source:t.source, autoImported:true });
    }
  });
  try { localStorage.setItem(TRACKER_KEY, JSON.stringify(trackerItems)); } catch(e) {}
}

function loadTriagedCount() {
  const stored = JSON.parse(localStorage.getItem(TRIAGED_KEY)||'{"date":"","count":0}');
  const today = new Date().toDateString();
  triagedToday = stored.date === today ? stored.count : 0;
}

function saveTriagedCount() {
  localStorage.setItem(TRIAGED_KEY, JSON.stringify({ date: new Date().toDateString(), count: triagedToday }));
}

function updateSyncStatus(lastSynced, error) {
  const s=document.getElementById('sync-status'), l=document.getElementById('sync-label-text'), t=document.getElementById('sync-time-text');
  if(error||!lastSynced){s.className='sync-status never';l.textContent='Not yet synced';t.textContent='Open Cowork to run first sync';return;}
  const d=new Date(lastSynced),now=new Date(),m=Math.round((now-d)/60000);
  s.className=m<120?'sync-status':'sync-status stale';
  l.textContent=m<5?'Synced just now':m<120?`Synced ${m}m ago`:'Sync overdue';
  t.textContent=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+' · '+d.toLocaleDateString([],{month:'short',day:'numeric'});
}

function reloadTasks(){showToast('Refreshing...');loadTasks();}

// ── Render dispatcher ─────────────────────────────────────────────
function renderTasks() {
  const addBtn = document.getElementById('add-btn');
  const wrap = document.getElementById('content-wrap');
  if (currentView==='tracker') {
    addBtn.innerHTML='<i class="ti ti-plus"></i> Add item'; addBtn.onclick=openTrackerModal;
    wrap.className='tracker-wrap'; renderTracker();
  } else if (currentView==='inbox') {
    addBtn.innerHTML='<i class="ti ti-plus"></i> Add task'; addBtn.onclick=openAddModal;
    wrap.className='inbox-wrap'; renderInbox();
  } else {
    addBtn.innerHTML='<i class="ti ti-plus"></i> Add task'; addBtn.onclick=openAddModal;
    wrap.className='dashboard-wrap'; renderDashboard();
  }
  updateCounts();
}

// ── Dashboard ─────────────────────────────────────────────────────
function renderDashboard() {
  const wrap = document.getElementById('content-wrap');
  const active = tasks.filter(t=>!t.done);
  const urgentTasks = active.filter(t=>t.urgency==='urgent');
  const todayTasks  = active.filter(t=>t.due&&t.due.toLowerCase().includes('today'));
  const inboxCount  = inboxItems.length;

  wrap.innerHTML = `
    <div class="today-strip">
      <div class="today-card urgent-card">
        <div class="today-card-label">Urgent</div>
        <div class="today-card-value">${urgentTasks.length}</div>
        <div class="today-card-sub">need attention now</div>
      </div>
      <div class="today-card">
        <div class="today-card-label">Due today</div>
        <div class="today-card-value">${todayTasks.length}</div>
        <div class="today-card-sub">scheduled for today</div>
      </div>
      <div class="today-card inbox-card" style="cursor:pointer" onclick="setView('inbox',document.querySelector('.nav-item:nth-child(2)'))">
        <div class="today-card-label">Inbox</div>
        <div class="today-card-value">${inboxCount}</div>
        <div class="today-card-sub">waiting to be triaged</div>
      </div>
      <div class="today-card">
        <div class="today-card-label">Total active</div>
        <div class="today-card-value">${active.length}</div>
        <div class="today-card-sub">across all priorities</div>
      </div>
    </div>
    <div id="task-sections"></div>`;

  const sectionsEl = document.getElementById('task-sections');
  const groups = ['urgent','high','medium','low','na',''];
  const icons = {urgent:'ti-flame',high:'ti-arrow-up',medium:'ti-minus',low:'ti-arrow-down',na:'ti-x','':"ti-circle-dashed"};
  const labels = {urgent:'Urgent',high:'High',medium:'Medium',low:'Low',na:'N/A','':'Unassigned'};

  groups.forEach(urg => {
    const list = active.filter(t=>(t.urgency||'')=== urg);
    if (!list.length) return;
    const collapsed = collapsedSections[urg];
    const sec = document.createElement('div'); sec.className='section';
    sec.innerHTML=`<div class="section-header">
      <div class="section-title"><i class="ti ${icons[urg]}"></i>${labels[urg]}<span class="section-count ${URG_SC[urg]||'sc-none'}">${list.length}</span></div>
      <button class="section-toggle" onclick="toggleSection('${urg}')"><i class="ti ${collapsed?'ti-chevron-right':'ti-chevron-down'}"></i></button>
    </div>
    <div class="section-body${collapsed?' collapsed':''}" id="sec-${urg||'unassigned'}"></div>`;
    sectionsEl.appendChild(sec);
    const body = sec.querySelector('.section-body');
    list.forEach(t => body.appendChild(buildTaskRow(t)));
    const addBtn = document.createElement('button'); addBtn.className='add-row-btn';
    addBtn.innerHTML=`<i class="ti ti-plus" style="font-size:13px"></i> Add task`;
    addBtn.onclick=()=>{ selectedUrg=urg||'medium'; openAddModal(); }; body.appendChild(addBtn);
  });
}

function toggleSection(urg) {
  collapsedSections[urg] = !collapsedSections[urg]; renderTasks();
}

function buildTaskRow(t) {
  const row = document.createElement('div'); row.className='task-row'+(t.done?' done-row':'');
  const srcTag = t.isReminder?'tag-reminder':'tag-'+t.source;
  const srcLabel = t.isReminder?'⏰ Reminder':{gmail:'Gmail',calendar:'Calendar',slack:'Slack',manual:'Manual'}[t.source]||t.source;
  const dueClass = t.due&&t.due.toLowerCase().includes('today')?'task-due-tag overdue':'task-due-tag';
  const escalFlag = t.escalation_flag?`<span class="escalation-flag">⚑ 5+ days</span>`:'';
  row.innerHTML=`
    <div class="task-check${t.done?' checked':''}" onclick="toggleDone(${t.id})"></div>
    <div class="task-row-name${t.done?' done-name':''}">${esc(t.name)}</div>
    <div class="task-row-meta">
      ${escalFlag}
      <span class="src-tag ${srcTag}">${srcLabel}</span>
      ${t.due?`<span class="${dueClass}"><i class="ti ti-calendar" style="font-size:10px"></i>${esc(t.due)}</span>`:''}
    </div>
    <button class="row-del" onclick="deleteTask(${t.id})" title="Delete"><i class="ti ti-trash"></i></button>`;
  return row;
}

// ── Inbox ─────────────────────────────────────────────────────────
function renderInbox() {
  const wrap = document.getElementById('content-wrap');
  if (!inboxItems.length) {
    wrap.innerHTML=`<div class="inbox-empty"><i class="ti ti-inbox"></i><div class="inbox-empty-title">Inbox is clear!</div><div class="inbox-empty-sub">New tasks from Gmail, Slack, and Calendar will appear here when Cowork syncs. You've triaged <strong>${triagedToday}</strong> task${triagedToday!==1?'s':''} today.</div></div>`;
    return;
  }
  wrap.innerHTML=`<div class="inbox-header-bar"><div class="inbox-title">Triage your inbox</div><div class="triage-counter">✓ ${triagedToday} triaged today</div></div><div id="inbox-list"></div>`;
  const list = document.getElementById('inbox-list');
  inboxItems.forEach(t => list.appendChild(buildInboxCard(t)));
}

function buildInboxCard(t) {
  const card = document.createElement('div'); card.className='inbox-card'; card.id='inbox-card-'+t.id;
  const srcTag = t.isReminder?'tag-reminder':'tag-'+(t.source||'manual');
  const srcLabel = t.isReminder?'⏰ Reminder':{gmail:'Gmail',calendar:'Calendar',slack:'Slack',manual:'Manual'}[t.source]||t.source;
  const sugLabel = t.suggestedUrg ? URG_LABEL[t.suggestedUrg] : '';
  card.innerHTML=`
    <div class="inbox-card-top">
      <div class="inbox-card-name">${esc(t.name)}</div>
      <button class="inbox-dismiss" onclick="dismissInbox(${t.id})" title="Dismiss"><i class="ti ti-x"></i></button>
    </div>
    <div class="inbox-card-meta">
      <span class="src-tag ${srcTag}">${srcLabel}</span>
      ${t.due?`<span class="task-due-tag"><i class="ti ti-calendar" style="font-size:10px"></i>${esc(t.due)}</span>`:''}
    </div>
    ${sugLabel?`<div class="inbox-suggested"><i class="ti ti-sparkles" style="font-size:12px"></i>Suggested: <strong>${sugLabel}</strong></div>`:''}
    <div class="triage-btns">
      <button class="triage-btn tb-urgent" onclick="triageTask(${t.id},'urgent')">🔥 Urgent</button>
      <button class="triage-btn tb-high" onclick="triageTask(${t.id},'high')">⬆ High</button>
      <button class="triage-btn tb-medium" onclick="triageTask(${t.id},'medium')">— Medium</button>
      <button class="triage-btn tb-low" onclick="triageTask(${t.id},'low')">⬇ Low</button>
      <button class="triage-btn tb-na" onclick="triageTask(${t.id},'na')">✕ N/A</button>
    </div>`;
  return card;
}

function triageTask(id, urgency) {
  const idx = inboxItems.findIndex(t=>t.id===id); if(idx===-1) return;
  const t = { ...inboxItems[idx], urgency, inboxed:false };
  delete t.suggestedUrg;
  inboxItems.splice(idx,1);
  tasks.push(t);
  triagedToday++; saveTriagedCount();
  // add to tracker
  trackerItems.push({ tid:nextTid++, taskId:t.id, name:t.name, details:'', owner:'', urgency, notes:'', due:t.due||'', source:t.source, autoImported:true });
  try { localStorage.setItem(TRACKER_KEY, JSON.stringify(trackerItems)); } catch(e) {}
  saveAll();
  showToast(`Moved to ${URG_LABEL[urgency]} ✓`);
  // animate card out
  const card = document.getElementById('inbox-card-'+id);
  if(card){ card.style.transition='opacity .2s,transform .2s'; card.style.opacity='0'; card.style.transform='translateX(20px)'; setTimeout(()=>renderTasks(),200); }
  else renderTasks();
}

function dismissInbox(id) {
  inboxItems = inboxItems.filter(t=>t.id!==id);
  // save to deleted so it doesn't reappear
  const del = JSON.parse(localStorage.getItem(MANUAL_KEY+'_deleted')||'[]');
  del.push(id); localStorage.setItem(MANUAL_KEY+'_deleted', JSON.stringify(del));
  saveAll(); showToast('Dismissed'); renderTasks();
}

// ── Task actions ──────────────────────────────────────────────────
function toggleDone(id) {
  const t=tasks.find(t=>t.id===id); if(!t) return;
  t.done=!t.done;
  const done=JSON.parse(localStorage.getItem(MANUAL_KEY+'_done')||'{}');
  done[id]=t.done; localStorage.setItem(MANUAL_KEY+'_done',JSON.stringify(done));
  saveAll(); showToast(t.done?'Marked complete ✓':'Reopened'); renderTasks();
}

function deleteTask(id) {
  tasks=tasks.filter(t=>t.id!==id);
  const del=JSON.parse(localStorage.getItem(MANUAL_KEY+'_deleted')||'[]');
  del.push(id); localStorage.setItem(MANUAL_KEY+'_deleted',JSON.stringify(del));
  saveAll(); showToast('Task deleted'); renderTasks();
}

// ── Work Tracker ──────────────────────────────────────────────────
function renderTracker() {
  const wrap = document.getElementById('content-wrap');
  let filtered=[...trackerItems];
  if(tFilter.urgency) filtered=filtered.filter(ti=>ti.urgency===tFilter.urgency);
  if(tFilter.search){const s=tFilter.search.toLowerCase();filtered=filtered.filter(ti=>ti.name.toLowerCase().includes(s)||(ti.details||'').toLowerCase().includes(s)||(ti.notes||'').toLowerCase().includes(s));}
  filtered.sort((a,b)=>{
    let av,bv;
    if(tSort.col==='urgency'){av=URG_ORDER[a.urgency||''];bv=URG_ORDER[b.urgency||''];}
    else if(tSort.col==='due'){av=a.due||'zzz';bv=b.due||'zzz';}
    else{av=(a[tSort.col]||'').toLowerCase();bv=(b[tSort.col]||'').toLowerCase();}
    return av<bv?(tSort.dir==='asc'?-1:1):av>bv?(tSort.dir==='asc'?1:-1):0;
  });
  const si=col=>`<span class="sort-icon">${tSort.col===col?(tSort.dir==='asc'?'↑':'↓'):'↕'}</span>`;
  const th=(col,label)=>`<th class="${tSort.col===col?'sorted':''}" onclick="sortTracker('${col}')">${label}${si(col)}</th>`;
  wrap.innerHTML=`
    <div class="tracker-toolbar">
      <div class="filter-group"><span class="filter-label">Urgency</span>
        <select class="filter-select" onchange="tFilter.urgency=this.value;renderTasks()">
          <option value="">All</option>
          ${URG_LEVELS.map(u=>`<option value="${u}" ${tFilter.urgency===u?'selected':''}>${URG_LABEL[u]}</option>`).join('')}
        </select></div>
      <div class="filter-group"><span class="filter-label">Search</span>
        <input class="filter-input" type="text" placeholder="Filter tasks…" value="${esc(tFilter.search)}" oninput="tFilter.search=this.value;renderTasks()"></div>
      ${(tFilter.urgency||tFilter.search)?`<button class="filter-clear" onclick="tFilter={urgency:'',search:''};renderTasks()">Clear</button>`:''}
      <span class="tracker-count">${filtered.length} item${filtered.length!==1?'s':''}</span>
    </div>
    <div class="tracker-scroll">
      <table class="tracker-table">
        <thead><tr>${th('name','Task')}${th('owner','Owner')}${th('details','Details')}${th('urgency','Urgency')}${th('notes','Notes')}${th('due','Due date')}<th></th></tr></thead>
        <tbody id="tracker-tbody"></tbody>
      </table>
      ${filtered.length===0?`<div class="tracker-empty"><i class="ti ti-clipboard" style="font-size:28px;display:block;margin-bottom:10px;opacity:.3"></i>No items match</div>`:''}
    </div>`;
  const tbody=document.getElementById('tracker-tbody');
  if(tbody) filtered.forEach(ti=>tbody.appendChild(buildTrackerRow(ti)));
}

function buildTrackerRow(ti) {
  const tr=document.createElement('tr'); tr.className='tracker-row';
  const srcColor={gmail:'var(--coral-400)',calendar:'var(--teal-400)',slack:'var(--purple-400)',manual:'var(--gray-400)'}[ti.source]||'var(--gray-400)';
  const urgClass=URG_CLASS[ti.urgency||'']||'urg-none';
  const urgLabel=URG_LABEL[ti.urgency||'']||'';
  const dueClass=ti.due&&ti.due.toLowerCase().includes('today')?'due-cell overdue':'due-cell';
  tr.innerHTML=`
    <td><div class="task-name-cell"><div class="row-source-dot" style="background:${srcColor}"></div><div class="task-name-text editable" contenteditable="true" onblur="updateTrackerField(${ti.tid},'name',this.innerText)">${esc(ti.name)}</div></div></td>
    <td><div class="editable" contenteditable="true" onblur="updateTrackerField(${ti.tid},'owner',this.innerText)">${esc(ti.owner||'')}</div></td>
    <td class="details-cell"><div class="editable" contenteditable="true" onblur="updateTrackerField(${ti.tid},'details',this.innerText)">${esc(ti.details||'')}</div></td>
    <td><span class="urgency-pill ${urgClass}" onclick="cycleUrgency(${ti.tid})" title="Click to change">${urgLabel||'<span style="color:var(--text-muted);font-size:11px;font-weight:400">Set</span>'}</span></td>
    <td class="notes-cell"><div class="editable" contenteditable="true" onblur="updateTrackerField(${ti.tid},'notes',this.innerText)">${esc(ti.notes||'')}</div></td>
    <td class="${dueClass}"><div class="editable" contenteditable="true" onblur="updateTrackerField(${ti.tid},'due',this.innerText)">${esc(ti.due||'')}</div></td>
    <td><div class="row-actions"><button class="row-action-btn" onclick="deleteTrackerItem(${ti.tid})"><i class="ti ti-trash"></i></button></div></td>`;
  return tr;
}

function sortTracker(col){if(tSort.col===col)tSort.dir=tSort.dir==='asc'?'desc':'asc';else{tSort.col=col;tSort.dir='asc';}renderTasks();}
function cycleUrgency(tid){const ti=trackerItems.find(t=>t.tid===tid);if(!ti)return;const c=['urgent','high','medium','low','na',''];ti.urgency=c[(c.indexOf(ti.urgency||'')+1)%c.length];try{localStorage.setItem(TRACKER_KEY,JSON.stringify(trackerItems));}catch(e){}renderTasks();}
function updateTrackerField(tid,field,value){const ti=trackerItems.find(t=>t.tid===tid);if(!ti)return;ti[field]=value.trim();try{localStorage.setItem(TRACKER_KEY,JSON.stringify(trackerItems));}catch(e){}}
function deleteTrackerItem(tid){trackerItems=trackerItems.filter(t=>t.tid!==tid);try{localStorage.setItem(TRACKER_KEY,JSON.stringify(trackerItems));}catch(e){}showToast('Item removed');renderTasks();}

// ── Add task modal ────────────────────────────────────────────────
function openAddModal(){
  closeModal();
  const overlay=document.createElement('div');overlay.className='modal-overlay';overlay.id='modal-overlay';
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
  const urgOpts=[['urgent','🔥 Urgent'],['high','⬆ High'],['medium','— Medium'],['low','⬇ Low'],['na','✕ N/A']];
  overlay.innerHTML=`<div class="modal">
    <div class="modal-header"><div class="modal-title">New task</div><button class="close-btn" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <div class="field"><label>Task name</label><input id="nt-name" type="text" placeholder="What needs to be done?" autocomplete="off"/></div>
    <div class="field"><label>Priority</label><div class="urg-grid">${urgOpts.map(([v,l])=>`<div class="urg-opt${selectedUrg===v?' sel-'+v:''}" id="uopt-${v}" onclick="selUrg('${v}')" style="cursor:pointer">${l}</div>`).join('')}</div></div>
    <div class="field-row">
      <div class="field"><label>Source</label><select id="nt-src"><option value="manual">Manual</option><option value="gmail">Gmail</option><option value="calendar">Calendar</option><option value="slack">Slack</option></select></div>
      <div class="field"><label>Due date <span class="field-optional">optional</span></label><input id="nt-due" type="text" placeholder="e.g. Today, Jun 20"/></div>
    </div>
    <div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="addTask()">Add task</button></div>
  </div>`;
  document.body.appendChild(overlay);
  setTimeout(()=>{const i=document.getElementById('nt-name');if(i)i.focus();},50);
  document.addEventListener('keydown',handleModalKey);
}

function selUrg(v){selectedUrg=v;['urgent','high','medium','low','na'].forEach(u=>{const el=document.getElementById('uopt-'+u);if(el)el.className='urg-opt'+(u===v?' sel-'+v:'');});}

function addTask(){
  const name=(document.getElementById('nt-name')||{}).value?.trim();
  if(!name){const i=document.getElementById('nt-name');if(i){i.style.borderColor='var(--red-400)';i.focus();}return;}
  const src=(document.getElementById('nt-src')||{}).value||'manual';
  const due=(document.getElementById('nt-due')||{}).value?.trim()||null;
  const task={id:nextId++,name,urgency:selectedUrg,source:src,due,done:false,isReminder:false,created_at:new Date().toISOString().split('T')[0]};
  tasks.push(task);
  // save to manual
  const manual=JSON.parse(localStorage.getItem(MANUAL_KEY+'_manual')||'[]'); manual.push(task); localStorage.setItem(MANUAL_KEY+'_manual',JSON.stringify(manual));
  trackerItems.push({tid:nextTid++,taskId:task.id,name,details:'',owner:'',urgency:selectedUrg,notes:'',due:due||'',source:src,autoImported:false});
  try{localStorage.setItem(TRACKER_KEY,JSON.stringify(trackerItems));}catch(e){}
  saveAll(); closeModal(); showToast('Task added ✓'); renderTasks();
}

// ── Tracker modal ─────────────────────────────────────────────────
function openTrackerModal(){
  closeModal();
  const overlay=document.createElement('div');overlay.className='modal-overlay';overlay.id='modal-overlay';
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
  const urgOpts=['','urgent','high','medium','low','na'].map(v=>`<option value="${v}">${v?URG_LABEL[v]:'— optional —'}</option>`).join('');
  overlay.innerHTML=`<div class="modal">
    <div class="modal-header"><div class="modal-title">New tracker item</div><button class="close-btn" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <div class="field"><label>Task</label><input id="ti-name" type="text" placeholder="What needs to be done?" autocomplete="off"/></div>
    <div class="field"><label>Owner <span class="field-optional">optional</span></label><input id="ti-owner" type="text" placeholder="e.g. Jen, Fawad…"/></div>
    <div class="field"><label>Details</label><textarea id="ti-details" placeholder="Add context or description…"></textarea></div>
    <div class="field-row">
      <div class="field"><label>Urgency <span class="field-optional">optional</span></label><select id="ti-urg">${urgOpts}</select></div>
      <div class="field"><label>Due date <span class="field-optional">optional</span></label><input id="ti-due" type="text" placeholder="e.g. Today, Jun 20"/></div>
    </div>
    <div class="field"><label>Notes <span class="field-optional">optional</span></label><input id="ti-notes" type="text" placeholder="Blockers, context…"/></div>
    <div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveTrackerModal()">Add item</button></div>
  </div>`;
  document.body.appendChild(overlay);
  setTimeout(()=>{const i=document.getElementById('ti-name');if(i)i.focus();},50);
  document.addEventListener('keydown',handleModalKey);
}

function saveTrackerModal(){
  const name=(document.getElementById('ti-name')||{}).value?.trim();
  if(!name){const i=document.getElementById('ti-name');if(i){i.style.borderColor='var(--red-400)';i.focus();}return;}
  const owner=(document.getElementById('ti-owner')||{}).value?.trim()||'';
  const details=(document.getElementById('ti-details')||{}).value?.trim()||'';
  const urgency=(document.getElementById('ti-urg')||{}).value||'';
  const due=(document.getElementById('ti-due')||{}).value?.trim()||'';
  const notes=(document.getElementById('ti-notes')||{}).value?.trim()||'';
  trackerItems.push({tid:nextTid++,taskId:null,name,details,owner,urgency,due,notes,source:'manual',autoImported:false});
  try{localStorage.setItem(TRACKER_KEY,JSON.stringify(trackerItems));}catch(e){}
  closeModal();showToast('Item added ✓');renderTasks();
}

function handleModalKey(e){if(e.key==='Escape')closeModal();}
function closeModal(){const m=document.getElementById('modal-overlay');if(m)m.remove();document.removeEventListener('keydown',handleModalKey);}

// ── Sync help ─────────────────────────────────────────────────────
function showSyncHelp(){
  closeModal();
  const overlay=document.createElement('div');overlay.className='modal-overlay';overlay.id='modal-overlay';
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
  overlay.innerHTML=`<div class="modal"><div class="modal-header"><div class="modal-title">How syncing works</div><button class="close-btn" onclick="closeModal()"><i class="ti ti-x"></i></button></div><div style="font-size:13px;color:var(--text-secondary);line-height:1.7"><p>Tasks are synced by <strong>Cowork</strong> running in the background on your computer.</p><br><p><strong>Schedule:</strong> 8am, 11am, 2pm, and 5pm daily.</p><br><p><strong>New tasks</strong> from Gmail, Calendar, and Slack land in your <strong>Inbox</strong> for triage — they stay there until you assign a priority.</p><br><p><strong>To force a sync now:</strong> Open Cowork in Claude Desktop and say <em>"Run a focus-tasks sync now."</em></p></div><div class="modal-footer"><button class="btn btn-primary" onclick="closeModal()">Got it</button></div></div>`;
  document.body.appendChild(overlay);
}

// ── Counts ────────────────────────────────────────────────────────
function updateCounts(){
  const urgent=tasks.filter(t=>!t.done&&t.urgency==='urgent').length;
  const uc=document.getElementById('urgent-count');
  if(uc){uc.textContent=urgent;uc.style.display=urgent?'':'none';}
  const ic=document.getElementById('inbox-count');
  if(ic)ic.textContent=inboxItems.length;
}

// ── View switching ────────────────────────────────────────────────
function setView(view,el){
  currentView=view;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(el)el.classList.add('active');
  const titles={dashboard:['Dashboard','Your day at a glance'],inbox:['Inbox','Triage new tasks from your apps'],tracker:['Work tracker','Track tasks with details, urgency and notes']};
  const [t,d]=titles[view]||['Tasks',''];
  document.getElementById('view-title').textContent=t;
  document.getElementById('view-desc').textContent=d;
  renderTasks();
}

// ── Utils ─────────────────────────────────────────────────────────
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);}

loadTasks();
</script>
</body>
</html>
